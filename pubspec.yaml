name: ebook_reader
description: A simple ebook reader app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  epubx: ^3.0.0
  pdfrx: ^1.0.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  file_picker: ^6.1.0
  provider: ^6.1.0
  uuid: ^4.2.0
  firebase_core: ^3.8.0
  firebase_auth: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
